[supervisord]
nodaemon=true

[program:postgres]
command=/usr/lib/postgresql/14/bin/postgres -D /var/lib/postgresql/data
user=postgres
autostart=true
autorestart=true
startsecs=5

[program:python-app]
command=python3 -m http.server 8000 --directory /opt/app
directory=/opt/app
autostart=true
autorestart=true
startsecs=3

[program:sshd]
command=/usr/sbin/sshd -D
autostart=true
autorestart=true
