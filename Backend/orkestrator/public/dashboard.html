<!DOCTYPE html>
<html lang="ru" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TaaS — Dashboard</title>
    <link href="https://api.fontshare.com/v2/css?f[]=satoshi@400,500,700&display=swap" rel="stylesheet">
    <style>
        :root, [data-theme="light"] {
            --color-bg: #f7f6f2; --color-surface: #f9f8f5; --color-surface-2: #fbfbf9;
            --color-border: #d4d1ca; --color-divider: #dcd9d5;
            --color-text: #28251d; --color-text-muted: #7a7974; --color-text-faint: #bab9b4;
            --color-primary: #01696f; --color-primary-hover: #0c4e54;
            --color-primary-highlight: #cedcd8;
            --color-success: #437a22; --color-success-highlight: #d4dfcc;
            --color-error: #a12c7b; --color-error-highlight: #e0ced7;
            --color-warning: #964219;
            --shadow-sm: 0 1px 2px oklch(0.2 0.01 80 / 0.06);
            --shadow-md: 0 4px 12px oklch(0.2 0.01 80 / 0.08);
            --radius-sm: 0.375rem; --radius-md: 0.5rem; --radius-lg: 0.75rem; --radius-full: 9999px;
            --space-1: 0.25rem; --space-2: 0.5rem; --space-3: 0.75rem; --space-4: 1rem;
            --space-5: 1.25rem; --space-6: 1.5rem; --space-8: 2rem; --space-10: 2.5rem; --space-12: 3rem;
            --text-xs: clamp(0.75rem, 0.7rem + 0.25vw, 0.875rem);
            --text-sm: clamp(0.875rem, 0.8rem + 0.35vw, 1rem);
            --text-base: clamp(1rem, 0.95rem + 0.25vw, 1.125rem);
            --text-lg: clamp(1.125rem, 1rem + 0.75vw, 1.5rem);
            --text-xl: clamp(1.5rem, 1.2rem + 1.25vw, 2.25rem);
            --font-body: 'Satoshi', 'Inter', sans-serif;
            --transition: 180ms cubic-bezier(0.16, 1, 0.3, 1);
        }

        [data-theme="dark"] {
            --color-bg: #171614; --color-surface: #1c1b19; --color-surface-2: #201f1d;
            --color-border: #393836; --color-divider: #262523;
            --color-text: #cdccca; --color-text-muted: #797876; --color-text-faint: #5a5957;
            --color-primary: #4f98a3; --color-primary-hover: #227f8b;
            --color-primary-highlight: #313b3b;
            --color-success: #6daa45; --color-success-highlight: #3a4435;
            --color-error: #d163a7; --color-error-highlight: #4c3d46;
            --color-warning: #fdab43;
            --shadow-sm: 0 1px 2px oklch(0 0 0 / 0.2);
            --shadow-md: 0 4px 12px oklch(0 0 0 / 0.3);
        }

        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        html { -webkit-font-smoothing: antialiased; scroll-behavior: smooth; }
        body { min-height: 100dvh; font-family: var(--font-body); font-size: var(--text-base); color: var(--color-text); background: var(--color-bg); }

        button { cursor: pointer; background: none; border: none; font: inherit; color: inherit; }
        input { font: inherit; color: inherit; }

        /* Layout */
        .app { display: grid; grid-template-rows: auto 1fr; min-height: 100dvh; }

        .topbar {
            display: flex; align-items: center; justify-content: space-between;
            padding: var(--space-4) var(--space-8);
            background: var(--color-surface);
            border-bottom: 1px solid var(--color-border);
            position: sticky; top: 0; z-index: 10;
        }
        .logo { display: flex; align-items: center; gap: var(--space-3); }
        .logo svg { color: var(--color-primary); }
        .logo-text { font-size: var(--text-lg); font-weight: 700; letter-spacing: -0.02em; }
        .logo-sub { font-size: var(--text-xs); color: var(--color-text-muted); font-weight: 400; }
        .topbar-right { display: flex; align-items: center; gap: var(--space-3); }

        .main { padding: var(--space-8); max-width: 1200px; margin-inline: auto; width: 100%; }

        /* KPI cards */
        .kpi-grid {
            display: grid; grid-template-columns: repeat(auto-fill, minmax(min(180px, 100%), 1fr)); gap: var(--space-4);
            margin-bottom: var(--space-8);
        }
        .kpi {
            background: var(--color-surface); border: 1px solid var(--color-border);
            border-radius: var(--radius-lg); padding: var(--space-5);
            box-shadow: var(--shadow-sm);
        }
        .kpi-label { font-size: var(--text-xs); color: var(--color-text-muted); text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: var(--space-2); }
        .kpi-value {
            font-size: var(--text-xl); font-weight: 700;
            font-variant-numeric: tabular-nums lining-nums;
            transition: color var(--transition);
        }
        .kpi-value.running { color: var(--color-success); }
        .kpi-value.stopped { color: var(--color-error); }

        /* Deploy form */
        .deploy-section {
            background: var(--color-surface); border: 1px solid var(--color-border);
            border-radius: var(--radius-lg); padding: var(--space-6);
            margin-bottom: var(--space-8); box-shadow: var(--shadow-sm);
        }
        .section-title { font-size: var(--text-lg); font-weight: 700; margin-bottom: var(--space-5); letter-spacing: -0.01em; }
        .deploy-form { display: flex; gap: var(--space-3); flex-wrap: wrap; align-items: flex-end; }
        .field { display: flex; flex-direction: column; gap: var(--space-2); flex: 1; min-width: 180px; }
        .field label { font-size: var(--text-xs); color: var(--color-text-muted); text-transform: uppercase; letter-spacing: 0.06em; }
        .field input {
            background: var(--color-surface-2, var(--color-bg));
            border: 1px solid var(--color-border);
            border-radius: var(--radius-md);
            padding: var(--space-3) var(--space-4);
            font-size: var(--text-sm);
            outline: none;
            transition: border-color var(--transition), box-shadow var(--transition);
        }
        .field input:focus {
            border-color: var(--color-primary);
            box-shadow: 0 0 0 3px var(--color-primary-highlight);
        }
        .field input::placeholder { color: var(--color-text-faint); }
        .field small { font-size: var(--text-xs); color: var(--color-text-muted); }

        /* Buttons */
        .btn {
            padding: var(--space-3) var(--space-5); border-radius: var(--radius-md);
            font-size: var(--text-sm); font-weight: 500;
            transition: background var(--transition), color var(--transition),
                        box-shadow var(--transition), opacity var(--transition);
            white-space: nowrap;
        }
        .btn-primary { background: var(--color-primary); color: #fff; }
        .btn-primary:hover { background: var(--color-primary-hover); }
        .btn-primary:active { opacity: 0.85; }
        .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; }
        .btn-danger { background: transparent; color: var(--color-error); border: 1px solid var(--color-error); font-size: var(--text-xs); padding: var(--space-1) var(--space-3); }
        .btn-danger:hover { background: var(--color-error-highlight); }

        /* Toast */
        .toast-wrap {
            position: fixed; bottom: var(--space-6); right: var(--space-6);
            display: flex; flex-direction: column; gap: var(--space-2); z-index: 100;
            pointer-events: none;
        }
        .toast {
            background: var(--color-surface); border: 1px solid var(--color-border);
            border-radius: var(--radius-md); padding: var(--space-3) var(--space-5);
            box-shadow: var(--shadow-md); font-size: var(--text-sm);
            pointer-events: all;
            animation: toastIn 0.25s cubic-bezier(0.16, 1, 0.3, 1);
        }
        .toast.success { border-color: var(--color-success); color: var(--color-success); }
        .toast.error { border-color: var(--color-error); color: var(--color-error); }
        .toast.warning { border-color: var(--color-warning); color: var(--color-warning); }
        @keyframes toastIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }

        /* Environments table */
        .envs-section {
            background: var(--color-surface); border: 1px solid var(--color-border);
            border-radius: var(--radius-lg); overflow: hidden; box-shadow: var(--shadow-sm);
        }
        .envs-header {
            display: flex; align-items: center; justify-content: space-between;
            padding: var(--space-5) var(--space-6);
            border-bottom: 1px solid var(--color-divider);
        }
        .refresh-btn {
            font-size: var(--text-xs); color: var(--color-text-muted);
            display: flex; align-items: center; gap: var(--space-2);
            padding: var(--space-2) var(--space-3);
            border-radius: var(--radius-sm);
            transition: color var(--transition), background var(--transition);
        }
        .refresh-btn:hover { color: var(--color-text); background: var(--color-surface-2, var(--color-bg)); }
        .refresh-btn svg.spinning { animation: spin 0.8s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* Table */
        table { width: 100%; border-collapse: collapse; }
        thead th {
            padding: var(--space-3) var(--space-6);
            font-size: var(--text-xs); color: var(--color-text-muted);
            text-transform: uppercase; letter-spacing: 0.06em;
            text-align: left;
            border-bottom: 1px solid var(--color-divider);
        }
        tbody tr {
            transition: background var(--transition);
            border-bottom: 1px solid var(--color-divider);
        }
        tbody tr:last-child { border-bottom: none; }
        tbody tr:hover { background: var(--color-surface-2, var(--color-bg)); }
        td {
            padding: var(--space-4) var(--space-6);
            font-size: var(--text-sm);
            font-variant-numeric: tabular-nums lining-nums;
        }
        td.mono { font-family: 'SF Mono', 'Fira Code', 'Consolas', monospace; font-size: var(--text-xs); }

        /* Status badge */
        .badge {
            display: inline-flex; align-items: center; gap: var(--space-1);
            padding: var(--space-1) var(--space-3);
            border-radius: var(--radius-full); font-size: var(--text-xs); font-weight: 500;
        }
        .badge::before { content: ''; width: 6px; height: 6px; border-radius: 50%; background: currentColor; }
        .badge.running { color: var(--color-success); background: var(--color-success-highlight); }
        .badge.stopped, .badge.error { color: var(--color-error); background: var(--color-error-highlight); }

        /* Empty state */
        .empty {
            padding: var(--space-12) var(--space-8);
            text-align: center; color: var(--color-text-muted);
        }
        .empty svg { margin: 0 auto var(--space-4); color: var(--color-text-faint); }
        
        /* SSH cmd copy */
        .ssh-cmd {
            font-family: 'SF Mono', 'Fira Code', 'Consolas', monospace;
            font-size: var(--text-xs); color: var(--color-text-faint);
            background: var(--color-bg); border: 1px solid var(--color-divider);
            border-radius: var(--radius-sm); padding: 2px 6px; cursor: pointer;
            transition: color var(--transition), background var(--transition);
        }
        .ssh-cmd:hover { color: var(--color-primary); background: var(--color-primary-highlight); }

        /* Toggle */
        .theme-toggle {
            padding: var(--space-2); border-radius: var(--radius-md);
            color: var(--color-text-muted);
            transition: background var(--transition), color var(--transition);
        }
        .theme-toggle:hover { background: var(--color-divider); color: var(--color-text); }

        /* Live dot */
        .live-dot {
            width: 8px; height: 8px; border-radius: 50%;
            background: var(--color-success);
            animation: pulse 2s ease-in-out infinite;
        }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }

        /* MODAL STYLES */
        .modal-overlay {
            position: fixed; inset: 0;
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(4px);
            display: flex; align-items: center; justify-content: center;
            z-index: 1000;
            opacity: 0; animation: fadeIn 0.2s forwards;
        }
        @keyframes fadeIn { to { opacity: 1; } }
        
        .modal-content {
            background: var(--color-surface);
            border: 1px solid var(--color-border);
            border-radius: var(--radius-lg);
            width: 90%; max-width: 600px;
            box-shadow: var(--shadow-md);
            display: flex; flex-direction: column;
            max-height: 90vh; overflow-y: auto;
            transform: scale(0.95); animation: slideUp 0.3s forwards;
        }
        @keyframes slideUp { to { transform: scale(1); } }

        .modal-header {
            padding: var(--space-6);
            border-bottom: 1px solid var(--color-divider);
            display: flex; justify-content: space-between; align-items: center;
        }
        .modal-header h3 { font-size: var(--text-lg); font-weight: 700; color: var(--color-success); }
        .close-btn { font-size: 1.5rem; line-height: 1; color: var(--color-text-muted); }
        .close-btn:hover { color: var(--color-text); }

        .modal-body { padding: var(--space-6); }
        
        .info-grid {
            display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
            gap: var(--space-4);
            background: var(--color-surface-2);
            padding: var(--space-4);
            border-radius: var(--radius-md);
            margin-bottom: var(--space-6);
            border: 1px solid var(--color-border);
        }
        .info-item strong { display: block; font-size: var(--text-xs); color: var(--color-text-muted); text-transform: uppercase; margin-bottom: 2px; }
        .info-item a { color: var(--color-primary); text-decoration: none; }
        .info-item a:hover { text-decoration: underline; }

        .step { margin-bottom: var(--space-5); }
        .step strong { display: block; font-size: var(--text-sm); color: var(--color-text); margin-bottom: var(--space-2); }
        .step p { font-size: var(--text-sm); color: var(--color-text-muted); margin-bottom: var(--space-2); line-height: 1.5; }
        
        .cmd-box {
            display: block;
            background: var(--color-bg);
            border: 1px solid var(--color-border);
            border-left: 3px solid var(--color-primary);
            padding: var(--space-3);
            border-radius: var(--radius-sm);
            font-family: 'SF Mono', 'Fira Code', monospace;
            font-size: var(--text-xs);
            color: var(--color-text);
            cursor: pointer;
            transition: all 0.2s;
            word-break: break-all;
        }
        .cmd-box:hover {
            background: var(--color-primary-highlight);
            border-left-color: var(--color-primary-hover);
        }
        .cmd-box::after {
            content: '📋 Скопировать';
            float: right;
            font-size: 0.75rem;
            opacity: 0.6;
        }

        .modal-footer {
            padding: var(--space-4) var(--space-6);
            border-top: 1px solid var(--color-divider);
            background: var(--color-surface-2);
            text-align: right;
        }

        /* Mobile */
        @media (max-width: 640px) {
            .topbar { padding: var(--space-4); }
            .main { padding: var(--space-4); }
            .deploy-form { flex-direction: column; }
            .field { min-width: 0; }
            thead { display: none; }
            tbody tr { display: grid; gap: var(--space-1); padding: var(--space-4); }
            td { padding: 0; font-size: var(--text-xs); }
            td::before { content: attr(data-label) ': '; color: var(--color-text-muted); font-weight: 600; text-transform: uppercase; }
        }
    </style>
</head>
<body>
    <div class="app">
        <!-- Top Bar -->
        <header class="topbar">
            <div class="logo">
                <svg width="28" height="28" viewBox="0 0 28 28" fill="none" aria-label="TaaS logo">
                    <rect x="2" y="2" width="11" height="11" rx="2" fill="currentColor" opacity="0.8"/>
                    <rect x="15" y="2" width="11" height="11" rx="2" fill="currentColor" opacity="0.6"/>
                    <rect x="2" y="15" width="11" height="11" rx="2" fill="currentColor" opacity="0.4"/>
                    <rect x="15" y="15" width="11" height="11" rx="2" fill="currentColor" opacity="0.2"/>
                </svg>
                <div>
                    <div class="logo-text">TaaS</div>
                    <div class="logo-sub">Testing-as-a-Service</div>
                </div>
            </div>
            <div class="topbar-right">
                <div class="live-dot" title="Live polling активен"></div>
                <button class="theme-toggle" data-theme-toggle aria-label="Переключить тему"></button>
            </div>
        </header>

        <!-- Main -->
        <main class="main">
            <!-- KPIs -->
            <div class="kpi-grid">
                <div class="kpi">
                    <div class="kpi-label">Всего сред</div>
                    <div class="kpi-value" id="kpiTotal">—</div>
                </div>
                <div class="kpi">
                    <div class="kpi-label">Running</div>
                    <div class="kpi-value running" id="kpiRunning">—</div>
                </div>
                <div class="kpi">
                    <div class="kpi-label">Stopped</div>
                    <div class="kpi-value stopped" id="kpiStopped">—</div>
                </div>
            </div>

            <!-- Deploy form -->
            <section class="deploy-section">
                <h2 class="section-title">Развернуть среду</h2>
                <div class="deploy-form">
                    <div class="field">
                        <label for="clientIdInput">Client ID</label>
                        <input id="clientIdInput" type="text" placeholder="например: project-alpha" autocomplete="off">
                    </div>
                    <div class="field" style="flex-basis: 100%;">
                        <label for="sshKeyInput">SSH Public Key (optional)</label>
                        <input id="sshKeyInput" type="text" placeholder="ssh-ed25519 AAAA... (скопируй из ~/.ssh/id_ed25519.pub)">
                        <small>Если не указать, вход будет по паролю: <code>dev</code></small>
                    </div>
                    <button class="btn btn-primary" id="deployBtn" onclick="deployEnv()">
                        ▶ Развернуть
                    </button>
                </div>
            </section>

            <!-- Environments table -->
            <section class="envs-section">
                <div class="envs-header">
                    <h2 class="section-title" style="margin: 0">Активные среды</h2>
                    <button class="refresh-btn" id="refreshBtn" onclick="fetchEnvironments()">
                        <svg id="refreshIcon" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M23 4v6h-6M1 20v-6h6"/>
                            <path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/>
                        </svg>
                        Обновить
                    </button>
                </div>
                <div id="tableContainer">
                    <table><tbody id="skeletonBody">
                        <tr><td colspan="5" style="padding:var(--space-4) var(--space-6)">
                            <span class="skeleton" style="width:60%;display:block;margin-bottom:8px"></span>
                            <span class="skeleton" style="width:40%"></span>
                        </td></tr>
                    </tbody></table>
                </div>
            </section>
        </main>
    </div>

    <div class="toast-wrap" id="toastWrap"></div>

    <script>
        const API = '/api/environments';

        function showToast(msg, type = 'success') {
            const wrap = document.getElementById('toastWrap');
            const t = document.createElement('div');
            t.className = `toast ${type}`;
            t.textContent = msg;
            wrap.appendChild(t);
            setTimeout(() => {
                t.style.opacity = '0';
                t.style.transition = 'opacity 0.3s';
            }, 2500);
            setTimeout(() => t.remove(), 2800);
        }

        function copyText(text) {
            if (!navigator.clipboard) {
                alert('Скопируйте вручную:\n' + text);
                return;
            }
            navigator.clipboard.writeText(text).then(() => {
                showToast('Скопировано в буфер!', 'success');
            }).catch(() => {
                alert('Скопируйте вручную:\n' + text);
            });
        }

        function updateKPIs(envs) {
            const running = envs.filter(e => e.status === 'running').length;
            const stopped = envs.length - running;
            document.getElementById('kpiTotal').textContent = envs.length;
            document.getElementById('kpiRunning').textContent = running;
            document.getElementById('kpiStopped').textContent = stopped;
        }

        function renderTable(envs) {
            const container = document.getElementById('tableContainer');
            if (envs.length === 0) {
                container.innerHTML = `<div class="empty"><p>Нет активных сред.</p></div>`;
                return;
            }

            const rows = envs.map(env => {
                const host = window.location.hostname || 'localhost';
                const sshCmd = `ssh dev@${host} -p ${env.ssh_port}`;
                
                return `
                    <tr>
                        <td data-label="ID" class="mono">${escHtml(env.client_id)}</td>
                        <td data-label="Статус"><span class="badge ${env.status}">${env.status}</span></td>
                       <td data-label="URL">
                        ${env.url ? `
                            <a href="${escHtml(env.url)}" target="_blank" rel="noopener" style="text-decoration: none;">
                                <button class="btn btn-primary" 
                                    style="
                                        padding: 6px 12px; 
                ≠                        font-size: 12px; 
                                        font-weight: 500;
                                        display: inline-flex; 
                                        align-items: center; 
                                        gap: 6px;
                                        background: var(--color-surface-2);
                                        border: 1px solid var(--color-border);
                                        color: var(--color-text);
                                        transition: all 0.2s ease;
                                        box-shadow: 0 1px 2px rgba(0,0,0,0.05);
                                    "
                                    onmouseover="this.style.borderColor='var(--color-primary)'; this.style.color='var(--color-primary)'; this.style.transform='translateY(-1px)'; this.style.boxShadow='0 4px 8px rgba(0,0,0,0.1)';"
                                    onmouseout="this.style.borderColor='var(--color-border)'; this.style.color='var(--color-text)'; this.style.transform='translateY(0)'; this.style.boxShadow='0 1px 2px rgba(0,0,0,0.05)';"
                                >
                                    <!-- Иконка внешней ссылки -->
                                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                                        <path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"></path>
                                        <polyline points="15 3 21 3 21 9"></polyline>
                                        <line x1="10" y1="14" x2="21" y2="3"></line>
                                    </svg>
                                    <span>Открыть сайт</span>
                                </button>
                            </a>
                        ` : `<span style="color: var(--color-text-faint); font-style: italic;">—</span>`}
                    </td>
                        <td data-label="SSH"><span class="ssh-cmd" onclick="copyText('${sshCmd}')">:${env.ssh_port}</span></td>
                        <td data-label="Действие">
                            <button class="btn btn-danger" onclick="removeEnv('${escHtml(env.client_id)}')">Удалить</button>
                        </td>
                    </tr>
                `;
            }).join('');

            container.innerHTML = `<table><thead><tr><th>ID</th><th>Статус</th><th>URL</th><th>SSH</th><th></th></tr></thead><tbody>${rows}</tbody></table>`;
        }

        function escHtml(str) { return String(str).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;'); }

        async function fetchEnvironments() {
            const icon = document.getElementById('refreshIcon');
            icon.classList.add('spinning');
            try {
                const res = await fetch(API);
                if (!res.ok) throw new Error(`HTTP ${res.status}`);
                const envs = await res.json();
                updateKPIs(envs);
                renderTable(envs);
            } catch(err) {
                showToast(`Ошибка: ${err.message}`, 'error');
            } finally {
                icon.classList.remove('spinning');
            }
        }

        async function deployEnv() {
            const clientId = document.getElementById('clientIdInput').value.trim();
            const sshPublicKey = document.getElementById('sshKeyInput').value.trim();
            const btn = document.getElementById('deployBtn');

            if (!clientId) { showToast('Введи Client ID', 'error'); return; }

            btn.disabled = true;
            btn.textContent = '⏳ Деплой...';

            try {
                const payload = { clientId };
                if (sshPublicKey) payload.sshPublicKey = sshPublicKey;

                const res = await fetch(API, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });
                const data = await res.json();
                
                if (!res.ok) throw new Error(data.error || `HTTP ${res.status}`);

                if (data.existed) {
                    showToast(`Контейнер ${clientId} уже существует!`, 'warning');
                } else {
                    showToast(`Среда ${clientId} запущена!`, 'success');
                    showSuccessModal({ ...data, sshPublicKey }); // Передаем данные в модалку
                    document.getElementById('clientIdInput').value = '';
                    document.getElementById('sshKeyInput').value = '';
                    await fetchEnvironments();
                }
            } catch(err) {
                showToast(`Ошибка: ${err.message}`, 'error');
            } finally {
                btn.disabled = false;
                btn.textContent = '▶ Развернуть';
            }
        }

        function showSuccessModal(env) {
            const modal = document.createElement('div');
            modal.className = 'modal-overlay';
            modal.onclick = () => modal.remove();

            const host = window.location.hostname || 'localhost';
            const sshCmd = `ssh dev@${host} -p ${env.sshPort}`;
            
            // Логика отображения инструкции в зависимости от наличия ключа
            const authStep = env.sshPublicKey 
                ? `
                    <div class="step">
                        <strong>3. Вход без пароля 🔑</strong>
                        <p>Твой ключ уже загружен в контейнер. Просто подключись:</p>
                        <div class="cmd-box" onclick="copyText('${sshCmd.replace(/'/g, "\\'")}')">${sshCmd}</div>
                    </div>`
                : `
                    <div class="step">
                        <strong>3. Вход по паролю 🔒</strong>
                        <p>Используй стандартный пароль: <code style="background:var(--color-bg); padding:2px 4px; border-radius:4px;">dev</code></p>
                        <div class="cmd-box" onclick="copyText('${sshCmd.replace(/'/g, "\\'")}')">${sshCmd}</div>
                    </div>`;

            modal.innerHTML = `
                <div class="modal-content" onclick="event.stopPropagation()">
                    <div class="modal-header">
                        <h3>🎉 Среда готова!</h3>
                        <button class="close-btn" onclick="this.closest('.modal-overlay').remove()">&times;</button>
                    </div>
                    <div class="modal-body">
                        <div class="info-grid">
                            <div class="info-item"><strong>ID</strong>${env.clientId}</div>
                            <div class="info-item"><strong>URL</strong><a href="${env.url}" target="_blank">Открыть сайт</a></div>
                            <div class="info-item"><strong>SSH Порт</strong>${env.sshPort}</div>
                        </div>

                        <h4 style="margin-bottom:1rem; font-size:var(--text-sm); text-transform:uppercase; color:var(--color-text-muted);">Инструкция:</h4>
                        
                        <div class="step">
                            <strong>1. Подключись по SSH</strong>
                            <p>Выполни команду в терминале своего компьютера:</p>
                            <div class="cmd-box" onclick="copyText('${sshCmd.replace(/'/g, "\\'")}')">${sshCmd}</div>
                        </div>

                        ${authStep}

                        <div class="step">
                            <strong>4. Работа с кодом 📂</strong>
                            <p>Ты сразу попадешь в папку <code>/workspace</code>. Клонируй проект точкой в конце:</p>
                            <div class="cmd-box" onclick="copyText('git clone https://github.com/user/repo.git .')">git clone https://github.com/user/repo.git .</div>
                            <p style="margin-top:0.5rem; font-size:0.85em;">Файлы сразу появятся на сайте по ссылке выше.</p>
                        </div>
                    </div>
                    <div class="modal-footer">
                        <button class="btn btn-primary" onclick="this.closest('.modal-overlay').remove()">Понятно</button>
                    </div>
                </div>
            `;
            document.body.appendChild(modal);
        }

        async function removeEnv(clientId) {
            if (!confirm(`Удалить среду "${clientId}"?`)) return;
            try {
                const res = await fetch(`${API}/${encodeURIComponent(clientId)}`, { method: 'DELETE' });
                const data = await res.json();
                if (!res.ok) throw new Error(data.error);
                showToast(`Среда ${clientId} удалена`, 'success');
                fetchEnvironments();
            } catch(err) {
                showToast(`Ошибка: ${err.message}`, 'error');
            }
        }

        // Theme Toggle Logic
        (function() {
            const btn = document.querySelector('[data-theme-toggle]');
            const html = document.documentElement;
            let d = html.getAttribute('data-theme') || 'dark';
            const setIcon = (theme) => {
                btn.innerHTML = theme === 'dark' 
                    ? `<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="5"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/></svg>`
                    : `<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>`;
            };
            setIcon(d);
            btn.addEventListener('click', () => {
                d = d === 'dark' ? 'light' : 'dark';
                html.setAttribute('data-theme', d);
                setIcon(d);
            });
        })();

        // Init
        fetchEnvironments();
        setInterval(fetchEnvironments, 5000);
    </script>
</body>
</html>
